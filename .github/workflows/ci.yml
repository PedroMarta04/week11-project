name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ── Build each service in parallel ──────────────────────────
  java-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            port: 8080
          - name: user-service
            port: 8081
          - name: product-service
            port: 8082
          - name: order-service
            port: 8083

    defaults:
      run:
        working-directory: ${{ matrix.service.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Validate POM
        run: mvn -B -q validate

      - name: Compile
        run: mvn -B -q compile

      - name: Unit tests
        run: mvn -B verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.service.name }}
          path: ${{ matrix.service.name }}/target/surefire-reports/
