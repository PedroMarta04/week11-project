      #   if: always()
      #   uses: slackapi/slack-github-action@v1.27.0
      #   with:
      #     webhook-type: incoming-webhook
      #     webhook: ${{ secrets.SLACK_WEBHOOK }}
      #     payload: |
      #       {
      #         "text": "Build ${{ job.status }}: ${{ matrix.service }} @ ${{ github.sha }}"
      #       }
